        set type physical
        set snmp-index 11
    next
    edit "naf.root"
        set vdom "root"
        set type tunnel
        set src-check disable
        set snmp-index 12
    next
    edit "l2t.root"
        set vdom "root"
        set type tunnel
        set snmp-index 13
    next
    edit "ssl.root"
        set vdom "root"
        set type tunnel
        set alias "SSL VPN interface"
        set snmp-index 14
    next
    edit "internal"
        set vdom "root"
        set ip 192.168.1.99 255.255.255.0
        set allowaccess ping https ssh fgfm fabric
        set type hard-switch
        set alias "management"
        set stp enable
        set role lan
        set snmp-index 15
    next
    edit "fortilink"
        set vdom "root"
        set fortilink enable
        set ip 10.255.1.1 255.255.255.0
        set allowaccess ping fabric
        set type aggregate
        set lldp-reception enable
        set lldp-transmission enable
        set snmp-index 16
    next
    edit "to-fw2"
        set vdom "root"
        set type tunnel
        set snmp-index 17
        set interface "wan2"
    next
end
config system physical-switch
